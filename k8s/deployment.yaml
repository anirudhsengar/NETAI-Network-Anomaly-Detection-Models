apiVersion: apps/v1
kind: Deployment
metadata:
  name: netai-anomaly-inference
  namespace: netai
  labels:
    app: netai-anomaly
    component: inference
spec:
  replicas: 2
  selector:
    matchLabels:
      app: netai-anomaly
      component: inference
  template:
    metadata:
      labels:
        app: netai-anomaly
        component: inference
    spec:
      containers:
        - name: inference
          image: netai-anomaly:latest
          ports:
            - containerPort: 8000
              name: http
          env:
            - name: DEVICE
              value: "cpu"
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "2Gi"
              cpu: "1000m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          volumeMounts:
            - name: model-storage
              mountPath: /app/checkpoints
            - name: config
              mountPath: /app/configs/default.yaml
              subPath: default.yaml
      volumes:
        - name: model-storage
          persistentVolumeClaim:
            claimName: netai-model-pvc
        - name: config
          configMap:
            name: netai-anomaly-config
